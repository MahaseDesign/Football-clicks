<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Clicker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #2d7a3a;
    --pitch-dark: #1e5428;
    --pitch-light: #3a9648;
    --white: #f5f5f5;
    --gold: #f5c518;
    --gold-dark: #c9a000;
    --red: #e53935;
    --navy: #0a1628;
    --sky: #87ceeb;
    --cloud: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── SIGN-IN SCREEN ── */
  #signin-screen {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(160deg, #0a1628 0%, #1a3a5c 60%, #0d2137 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  .signin-card {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 48px 40px;
    width: min(420px, 92vw);
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }

  .signin-ball {
    font-size: 72px;
    animation: spinBall 4s linear infinite;
    display: inline-block;
    margin-bottom: 12px;
  }

  @keyframes spinBall {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .signin-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--white);
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .signin-sub {
    color: var(--gold);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .field-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .field-group.single { grid-template-columns: 1fr; }

  .input-wrap { position: relative; }
  .input-wrap label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    text-align: left;
  }
  .input-wrap input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .input-wrap input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.12);
  }
  .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }

  .team-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
  }
  .team-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.6);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .team-btn:hover { border-color: var(--gold); color: var(--gold); }
  .team-btn.selected {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
  }

  .kick-off-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 6px 24px rgba(245,197,24,0.35);
  }
  .kick-off-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(245,197,24,0.5); }
  .kick-off-btn:active { transform: translateY(1px); }
  .err-msg { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* ── GAME SCREEN ── */
  #game-screen {
    display: none;
    width: 100vw;
    min-height: 100vh;
    background: linear-gradient(180deg, #87ceeb 0%, #b8e0f7 38%, #2d7a3a 38%);
    flex-direction: column;
    align-items: center;
    padding-bottom: 40px;
    position: relative;
  }

  /* grass stripes */
  #game-screen::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 62%;
    background: repeating-linear-gradient(
      90deg,
      var(--pitch) 0px, var(--pitch) 60px,
      var(--pitch-dark) 60px, var(--pitch-dark) 120px
    );
    z-index: 0;
  }

  .hud {
    position: relative; z-index: 10;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 10px;
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(8px);
  }

  .player-badge {
    display: flex; align-items: center; gap: 10px;
  }
  .squad-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--gold);
    line-height: 1;
  }
  .player-info { text-align: left; }
  .player-name { font-weight: 900; font-size: 14px; color: var(--white); }
  .player-team { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 700; letter-spacing: 1px; }

  .score-display {
    text-align: center;
  }
  .score-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(255,255,255,0.4);
  }
  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 20px rgba(245,197,24,0.4);
    transition: transform 0.1s;
  }
  .score-num.pop { transform: scale(1.3); }

  .clicks-left {
    text-align: right;
  }
  .clicks-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    line-height: 1;
  }
  .clicks-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  /* progress bar */
  .progress-bar-wrap {
    position: relative; z-index: 10;
    width: calc(100% - 48px);
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin: 8px 24px 0;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 4px;
    transition: width 0.3s;
  }

  /* sky / pitch area */
  .game-field {
    position: relative; z-index: 5;
    width: 100%;
    min-height: 75vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Football */
  #football {
    font-size: clamp(80px, 15vw, 120px);
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
    z-index: 10;
    position: relative;
  }
  #football:active { transform: scale(0.88); }
  #football.kick {
    animation: kickAnim 0.25s ease-out;
  }
  @keyframes kickAnim {
    0% { transform: scale(1); }
    40% { transform: scale(0.82) rotate(-12deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* floating +1 */
  .float-score {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
    z-index: 20;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.3); }
  }

  /* ── QUESTION OVERLAY ── */
  #question-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 200;
    pointer-events: none;
  }
  #question-overlay.active {
    display: block;
    pointer-events: all;
  }

  .sky-bg {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(135,206,235,0.97) 0%, rgba(184,224,247,0.98) 100%);
    animation: skyFadeIn 0.4s ease;
  }
  @keyframes skyFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .question-header {
    position: absolute;
    top: 60px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
  }
  .question-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 6vw, 52px);
    color: var(--navy);
    letter-spacing: 2px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.5);
  }
  .question-header p {
    font-size: clamp(13px, 2.5vw, 18px);
    color: var(--navy);
    font-weight: 700;
    margin-top: 8px;
    padding: 0 20px;
  }
  .double-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    padding: 4px 16px;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    box-shadow: 0 4px 12px rgba(245,197,24,0.4);
  }

  /* clouds */
  .cloud-container {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 32px 28px;
    padding: 220px 32px 110px;
    align-content: center;
  }

  .cloud-answer {
    position: relative;
    cursor: pointer;
    width: min(260px, 42vw);
    min-width: 150px;
    text-align: center;
    animation: cloudFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.18));
    transition: filter 0.2s;
  }
  .cloud-answer:nth-child(2) { animation-delay: -1s; }
  .cloud-answer:nth-child(3) { animation-delay: -2s; }
  .cloud-answer:nth-child(4) { animation-delay: -0.5s; }

  @keyframes cloudFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  .cloud-answer:hover { filter: drop-shadow(0 10px 24px rgba(0,0,0,0.28)); transform: scale(1.05); }
  .cloud-answer:active { transform: scale(0.97); }

  /* Cloud built with layered divs — no pseudo-elements over the text */
  .cloud-wrap {
    position: relative;
    width: 100%;
  }
  .cloud-bumps {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-around;
    padding: 0 18px;
    transform: translateY(-55%);
    pointer-events: none;
  }
  .cloud-bump {
    background: #ffffff;
    border-radius: 50%;
  }
  .cloud-bump-1 { width: 52px; height: 52px; }
  .cloud-bump-2 { width: 40px; height: 40px; margin-top: 8px; }
  .cloud-bump-3 { width: 34px; height: 34px; margin-top: 14px; }

  .cloud-body {
    background: #ffffff;
    border-radius: 40px;
    padding: 18px 20px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(13px, 2.6vw, 17px);
    color: var(--navy);
    line-height: 1.35;
    position: relative;
    z-index: 2;
    word-break: break-word;
  }

  .cloud-answer.correct .cloud-body,
  .cloud-answer.correct .cloud-bump {
    background: #4caf50;
    color: white;
  }
  .cloud-answer.correct { animation: correctPop 0.5s ease forwards; }

  .cloud-answer.wrong .cloud-body,
  .cloud-answer.wrong .cloud-bump {
    background: var(--red);
    color: white;
  }
  .cloud-answer.wrong { animation: wrongShake 0.4s ease forwards; }

  .cloud-answer.show-correct .cloud-body,
  .cloud-answer.show-correct .cloud-bump {
    background: #4caf50;
    color: white;
  }

  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .skip-btn {
    position: absolute;
    bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 12px 32px;
    background: rgba(10,22,40,0.7);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    color: rgba(255,255,255,0.7);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    z-index: 20;
  }
  .skip-btn:hover {
    background: rgba(10,22,40,0.9);
    color: white;
    border-color: rgba(255,255,255,0.5);
  }

  /* result flash */
  .result-flash {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
    pointer-events: none;
    opacity: 0;
  }
  .result-flash.show {
    animation: flashAnim 1.5s ease forwards;
  }
  @keyframes flashAnim {
    0% { opacity: 0; }
    20% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
  .result-flash-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 12vw, 100px);
    letter-spacing: 4px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .result-flash.correct-flash .result-flash-text { color: #4caf50; }
  .result-flash.wrong-flash .result-flash-text { color: var(--red); }

  /* notifications ring */
  .notification-ring {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 150;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
  }
  .notif {
    background: rgba(10,22,40,0.92);
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    padding: 10px 18px;
    color: var(--white);
    font-size: 13px;
    font-weight: 700;
    animation: notifSlide 0.3s ease, notifFade 0.4s 2.6s ease forwards;
    max-width: 240px;
    text-align: right;
  }
  @keyframes notifSlide {
    from { transform: translateX(60px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes notifFade {
    to { opacity: 0; transform: translateX(20px); }
  }

  /* question-available indicator */
  .q-indicator {
    position: fixed;
    top: 80px; right: 20px;
    z-index: 50;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 20px;
    animation: pulse 1.2s ease infinite;
    display: none;
  }
  .q-indicator.visible { display: block; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245,197,24,0.5); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(245,197,24,0); }
  }

  /* leaderboard style end screen */
  #end-screen {
    display: none;
    position: fixed; inset: 0; z-index: 400;
    background: linear-gradient(160deg, #0a1628, #1a3a5c);
    align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center; padding: 24px;
  }
  #end-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; color: var(--gold); letter-spacing: 3px;
    margin-bottom: 10px;
  }
  #end-screen .final-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 100px; color: var(--white); line-height: 1;
    text-shadow: 0 0 40px rgba(255,255,255,0.2);
  }
  #end-screen .play-again {
    margin-top: 32px;
    padding: 16px 48px;
    border-radius: 12px; border: none;
    background: var(--gold); color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(245,197,24,0.35);
  }
</style>
</head>
<body>

<!-- ─── SIGN-IN ─── -->
<div id="signin-screen">
  <div class="signin-card">
    <div class="signin-ball">⚽</div>
    <div class="signin-title">Football Clicker</div>
    <div class="signin-sub">Sign in to play</div>

    <div class="field-group">
      <div class="input-wrap">
        <label>First Name</label>
        <input type="text" id="first-name" placeholder="Jamie" maxlength="20">
      </div>
      <div class="input-wrap">
        <label>Last Name</label>
        <input type="text" id="last-name" placeholder="Vardy" maxlength="20">
      </div>
    </div>
    <div class="field-group">
      <div class="input-wrap">
        <label>Squad Number</label>
        <input type="number" id="squad-num" placeholder="9" min="1" max="99">
      </div>
      <div class="input-wrap">
        <label>Your Team</label>
        <input type="text" id="team-input" placeholder="Enter team..." maxlength="24" id="team-input">
      </div>
    </div>

    <div id="signin-err" class="err-msg"></div>
    <button class="kick-off-btn" onclick="startGame()">⚽ KICK OFF</button>
  </div>
</div>

<!-- ─── GAME ─── -->
<div id="game-screen">
  <div class="hud">
    <div class="player-badge">
      <div class="squad-num" id="hud-squad">#9</div>
      <div class="player-info">
        <div class="player-name" id="hud-name">Player Name</div>
        <div class="player-team" id="hud-team">Team Name</div>
      </div>
    </div>
    <div class="score-display">
      <div class="score-label">Score</div>
      <div class="score-num" id="score-display">0</div>
    </div>
    <div class="clicks-left">
      <div class="clicks-num" id="clicks-display">10</div>
      <div class="clicks-label">to Question</div>
    </div>
    <a href="leaderboard.html" style="
      padding:8px 14px; background:rgba(245,197,24,0.15);
      border:1.5px solid rgba(245,197,24,0.4); border-radius:10px;
      color:var(--gold); font-family:'Bebas Neue',sans-serif;
      font-size:16px; letter-spacing:1px; text-decoration:none;
      transition:background 0.2s;" onmouseover="this.style.background='rgba(245,197,24,0.28)'"
      onmouseout="this.style.background='rgba(245,197,24,0.15)'">🏆 TABLE</a>
    <button onclick="endGame()" style="
      padding:8px 14px; background:rgba(229,57,53,0.15);
      border:1.5px solid rgba(229,57,53,0.4); border-radius:10px;
      color:#ff6b6b; font-family:'Bebas Neue',sans-serif;
      font-size:16px; letter-spacing:1px; cursor:pointer;
      transition:background 0.2s;" onmouseover="this.style.background='rgba(229,57,53,0.28)'"
      onmouseout="this.style.background='rgba(229,57,53,0.15)'">⏹ END</button>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="game-field">
    <div id="football" onclick="clickBall(event)">⚽</div>
  </div>
</div>

<!-- question available indicator -->
<div class="q-indicator" id="q-indicator">⚡ QUESTION READY — TAP BALL</div>

<!-- ─── QUESTION OVERLAY ─── -->
<div id="question-overlay">
  <div class="sky-bg"></div>
  <div class="question-header">
    <div class="double-badge">🚀 DOUBLE YOUR SCORE!</div>
    <h2 id="q-text">What is 2 + 2?</h2>
    <p id="q-sub">Answer correctly to double your score, or skip to keep playing</p>
  </div>
  <div class="cloud-container" id="cloud-container"></div>
  <button class="skip-btn" onclick="skipQuestion()">⚽ Keep Clicking Instead</button>
</div>

<!-- result flashes -->
<div class="result-flash" id="correct-flash">
  <div class="result-flash-text">🎉 DOUBLED!</div>
</div>
<div class="result-flash" id="wrong-flash">
  <div class="result-flash-text">❌ UNLUCKY!</div>
</div>

<!-- notifications -->
<div class="notification-ring" id="notif-ring"></div>

<!-- ─── END SCREEN ─── -->
<div id="end-screen">
  <h1>Full Time!</h1>
  <div id="end-name" style="color:#fff;font-size:20px;font-weight:900;margin-bottom:8px;"></div>
  <div class="final-score" id="end-score">0</div>
  <div style="color:rgba(255,255,255,0.5);font-size:14px;margin-top:8px;margin-bottom:28px;">points scored</div>
  <button id="submit-btn" onclick="submitScore()" style="
    display:block; width:100%; max-width:320px;
    padding:16px; border-radius:12px; border:none;
    background:linear-gradient(135deg,#f5c518,#c9a000);
    color:#0a1628; font-family:'Bebas Neue',sans-serif;
    font-size:24px; letter-spacing:2px; cursor:pointer;

// ─── STATE ───
let player = {};
let score = 0;
let clicks = 0;
let totalClicks = 0;
let questionPending = false;
let currentQuestion = null;
let askedQuestions = new Set();
let questionAnswered = false;
let gameRunning = false;
let questionCount = 0; // even = football, odd = CS

function getTier() {
  if (score < 30) return 1;
  if (score < 80) return 2;
  if (score < 160) return 3;
  if (score < 300) return 4;
  return 5;
}

function getQuestion(tier) {
  // Alternate: even question numbers = football, odd = cs
  const wantSubject = (questionCount % 2 === 0) ? 'football' : 'cs';
  let pool = QUESTIONS.filter(q => q.subject === wantSubject && q.tier <= tier && !askedQuestions.has(q.q));
  // prefer current tier within subject
  const preferred = pool.filter(q => q.tier === tier);
  let source = preferred.length > 0 ? preferred : pool;
  if (source.length === 0) {
    // clear asked for this subject and retry
    QUESTIONS.filter(q => q.subject === wantSubject).forEach(q => askedQuestions.delete(q.q));
    pool = QUESTIONS.filter(q => q.subject === wantSubject && q.tier <= tier);
    source = pool.filter(q => q.tier === tier).length > 0
      ? pool.filter(q => q.tier === tier) : pool;
  }
  return source[Math.floor(Math.random() * source.length)];
}

// ─── SIGN IN ───
function startGame() {
  const fn = document.getElementById('first-name').value.trim();
  const ln = document.getElementById('last-name').value.trim();
  const sq = document.getElementById('squad-num').value.trim();
  const tm = document.getElementById('team-input').value.trim();
  const err = document.getElementById('signin-err');

  if (!fn || !ln) { err.textContent = 'Enter your first and last name'; return; }
  if (!sq || sq < 1 || sq > 99) { err.textContent = 'Enter a valid squad number (1–99)'; return; }
  if (!tm) { err.textContent = 'Enter your team name'; return; }
  err.textContent = '';

  player = { firstName: fn, lastName: ln, squad: sq, team: tm };
  score = 0; clicks = 0; questionPending = false; gameRunning = true;

  document.getElementById('hud-name').textContent = `${fn} ${ln}`;
  document.getElementById('hud-squad').textContent = `#${sq}`;
  document.getElementById('hud-team').textContent = tm.toUpperCase();
  updateHUD();

  document.getElementById('signin-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';

  showNotif(`Welcome, ${fn}! Start clicking! ⚽`);
}

// ─── CLICK BALL ───
function clickBall(event) {
  if (!gameRunning) return;

  // if question is pending, trigger it
  if (questionPending) {
    openQuestion();
    return;
  }

  const ball = document.getElementById('football');
  ball.classList.remove('kick');
  void ball.offsetWidth;
  ball.classList.add('kick');

  score += 1;
  clicks += 1;
  updateHUD();
  spawnFloat(event);

  if (clicks >= 10) {
    clicks = 0;
    questionPending = true;
    document.getElementById('q-indicator').classList.add('visible');
    showNotif('🎯 Question available! Tap the ball or keep clicking');
  }

  // Show end screen option after 50 clicks (give option to save)
  totalClicks++;
  if (totalClicks > 0 && totalClicks % 50 === 0) {
    showNotif(`⏸️ ${totalClicks} kicks! Tap 🏆 TABLE to check the leaderboard`);
  }
}

function spawnFloat(event) {
  const el = document.createElement('div');
  el.className = 'float-score';
  el.textContent = '+1';
  const rect = document.getElementById('football').getBoundingClientRect();
  el.style.left = (rect.left + rect.width/2 - 16 + (Math.random()*40-20)) + 'px';
  el.style.top = (rect.top - 10 + (Math.random()*20-10)) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function updateHUD() {
  const sd = document.getElementById('score-display');
  sd.textContent = score;
  sd.classList.remove('pop');
  void sd.offsetWidth;
  sd.classList.add('pop');
  setTimeout(() => sd.classList.remove('pop'), 120);

  const remaining = 10 - clicks;
  document.getElementById('clicks-display').textContent = questionPending ? '★' : remaining;

  const pct = (score / (score + 50)) * 100;
  document.getElementById('progress-bar').style.width = Math.min(pct, 100) + '%';
}

// ─── QUESTION ───
function openQuestion() {
  if (!questionPending) return;
  questionPending = false;
  questionAnswered = false;
  document.getElementById('q-indicator').classList.remove('visible');

  const tier = getTier();
  currentQuestion = getQuestion(tier);
  askedQuestions.add(currentQuestion.q);

  document.getElementById('q-text').textContent = currentQuestion.q;

  const tierLabels = ['', 'Easy', 'Easy', 'Medium', 'Hard', 'Expert'];
  const subjectLabel = currentQuestion.subject === 'cs' ? '💻 Computer Science' : '⚽ Football';
  document.getElementById('q-sub').textContent =
    `${subjectLabel} • ${tierLabels[currentQuestion.tier]} • Score: ${score} pts`;

  // Update badge colour for subject
  const badge = document.querySelector('.double-badge');
  if (currentQuestion.subject === 'cs') {
    badge.style.background = '#3b82f6';
    badge.style.color = 'white';
    badge.textContent = '💻 CS QUESTION — DOUBLE YOUR SCORE!';
  } else {
    badge.style.background = '';
    badge.style.color = '';
    badge.textContent = '⚽ FOOTBALL QUESTION — DOUBLE YOUR SCORE!';
  }

  // Build cloud answers (shuffle)
  const answers = currentQuestion.answers.map((a, i) => ({ text: a, idx: i }));
  for (let i = answers.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [answers[i], answers[j]] = [answers[j], answers[i]];
  }

  const container = document.getElementById('cloud-container');
  container.innerHTML = '';
  answers.forEach(ans => {
    const div = document.createElement('div');
    div.className = 'cloud-answer';
    div.innerHTML = `
      <div class="cloud-wrap">
        <div class="cloud-bumps">
          <div class="cloud-bump cloud-bump-1"></div>
          <div class="cloud-bump cloud-bump-2"></div>
          <div class="cloud-bump cloud-bump-3"></div>
        </div>
        <div class="cloud-body">${ans.text}</div>
      </div>`;
    div.onclick = () => answerQuestion(ans.idx === currentQuestion.correct, div, answers, container);
    container.appendChild(div);
  });

  questionCount++;
  document.getElementById('question-overlay').classList.add('active');
}

function answerQuestion(isCorrect, clickedEl, answers, container) {
  if (questionAnswered) return;
  questionAnswered = true;

  const clouds = container.querySelectorAll('.cloud-answer');
  clouds.forEach(c => { c.onclick = null; });

  if (isCorrect) {
    clickedEl.classList.add('correct');
    const oldScore = score;
    score = score * 2;
    updateHUD();
    showFlash('correct');
    setTimeout(() => {
      closeQuestion();
      showNotif(`🎉 Correct! Score doubled: ${oldScore} → ${score}`);
    }, 1400);
  } else {
    clickedEl.classList.add('wrong');
    // highlight the correct answer
    clouds.forEach(c => {
      const txt = c.querySelector('.cloud-body').textContent.trim();
      if (txt === currentQuestion.answers[currentQuestion.correct]) {
        c.classList.add('show-correct');
      }
    });
    showFlash('wrong');
    setTimeout(() => {
      closeQuestion();
      showNotif(`❌ Unlucky! Answer: ${currentQuestion.answers[currentQuestion.correct]}`);
    }, 1600);
  }
}

function skipQuestion() {
  closeQuestion();
  showNotif('⚽ Keep clicking!');
}

function closeQuestion() {
  document.getElementById('question-overlay').classList.remove('active');
}

function showFlash(type) {
  const el = document.getElementById(type === 'correct' ? 'correct-flash' : 'wrong-flash');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  el.style.pointerEvents = 'none';
}

// ─── NOTIFICATIONS ───
function showNotif(msg) {
  const ring = document.getElementById('notif-ring');
  const n = document.createElement('div');
  n.className = 'notif';
  n.textContent = msg;
  ring.appendChild(n);
  setTimeout(() => n.remove(), 3200);
}

// ─── END GAME ───
function endGame() {
  gameRunning = false;
  document.getElementById('end-name').textContent =
    `${player.firstName} ${player.lastName} — #${player.squad} — ${player.team}`;
  document.getElementById('end-score').textContent = score.toLocaleString();

// ─── SCORE SUBMISSION ───
async function submitScore() {
  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) {
    submitBtn.textContent = '⏳ Saving...';
    submitBtn.disabled = true;
  }

  const entry = {
    firstName: player.firstName,
    lastName:  player.lastName,
    squad:     player.squad,
    team:      player.team,
    score:     score,
    date:      Date.now()
  };

  // Helper: fetch with a timeout so the button never hangs forever
  function fetchWithTimeout(url, options, ms = 8000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    return fetch(url, { ...options, signal: controller.signal })
      .finally(() => clearTimeout(timer));
  }

  try {
    // 1. Read current scores (cache-bust with timestamp param)
    const getRes = await fetchWithTimeout(
      `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest?t=${Date.now()}`,
      { headers: { 'X-Master-Key': JSONBIN_API_KEY, 'Cache-Control': 'no-cache' } }
    );
    if (!getRes.ok) throw new Error(`Read failed: ${getRes.status}`);
    const getData = await getRes.json();
    const current = Array.isArray(getData.record?.scores) ? getData.record.scores : [];

    current.push(entry);

    // 2. Write back
    const putRes = await fetchWithTimeout(
      `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,
      {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify({ scores: current })
      }
    );

    if (putRes.ok) {
      if (submitBtn) {
        submitBtn.textContent = '✅ Saved!';
        submitBtn.style.background = '#4caf50';
        submitBtn.style.color = 'white';
        submitBtn.disabled = true;
      }
      showNotif('🏆 Score saved to the league table!');
    } else {
      const errText = await putRes.text().catch(() => putRes.status);
      throw new Error(`Write failed: ${errText}`);
    }
  } catch(e) {
    console.error('submitScore error:', e);
    const msg = e.name === 'AbortError' ? '⏱️ Timed out — try again' : '❌ Save failed — try again';
    if (submitBtn) {
      submitBtn.textContent = msg;
      submitBtn.disabled = false;
      submitBtn.style.background = '';
      submitBtn.style.color = '';
    }
    showNotif('❌ Could not save score. Check internet connection.');
  }
}

// ─── RESET ───
function resetGame() {
  document.getElementById('end-screen').style.display = 'none';
  score = 0; clicks = 0; totalClicks = 0; questionPending = false;
  gameRunning = true; questionCount = 0;
  askedQuestions.clear();
  document.getElementById('q-indicator').classList.remove('visible');
  updateHUD();
  showNotif('New game! ⚽ Click away!');
}
